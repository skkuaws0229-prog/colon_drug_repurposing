    :root {
      --bg: #f4f7fb;

      --ok: #177245;
      --warn: #996114;
      --bad: #a52a2a;
      --blue: #1f6feb;
      --teal: #188f7e;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "IBM Plex Sans KR", "Malgun Gothic", sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 16px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    h1, h2, h3 { margin: 0; }
    h1 { font-size: 1.6rem; }
    .sub { margin-top: 6px; color: var(--muted); font-size: 0.9rem; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .chip { border: 1px solid #c8d8ef; background: #eef5ff; color: #204a73; border-radius: 999px; padding: 4px 10px; font-size: 0.75rem; }
    .kpis { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; }
    .kpi { border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: #fbfdff; }
    .kpi .k { color: var(--muted); font-size: 0.75rem; }
    .kpi .v { font-size: 1.1rem; font-weight: 700; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th, td { border-bottom: 1px solid #ebf0f6; text-align: left; padding: 7px 6px; vertical-align: top; }
    th { background: #f6f9fe; color: #506b89; font-size: 0.74rem; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .pill { border-radius: 999px; padding: 2px 8px; font-size: 0.72rem; font-weight: 700; display: inline-block; }
    .ok { background: #dcf5e8; color: var(--ok); border: 1px solid #b9e5cd; }
    .bad { background: #ffe6e6; color: var(--bad); border: 1px solid #ffc7c7; }
    .mono { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; }
    .cohortHead { color: #fff; border-radius: 10px; padding: 10px; margin-bottom: 8px; font-weight: 700; }
    .colon { background: linear-gradient(135deg, var(--blue), #4c56cf); }
    .rectal { background: linear-gradient(135deg, var(--teal), #2b86ad); }
    @media (max-width: 980px) { .kpis { grid-template-columns: repeat(2, minmax(0,1fr)); } .grid2 { grid-template-columns: 1fr; } }
  </style>

      }

      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
      const fmt = (v, n=3) => (v === null || v === undefined || Number.isNaN(Number(v))) ? "-" : Number(v).toFixed(n);
      const pct = (v, n=1) => (v === null || v === undefined || Number.isNaN(Number(v))) ? "-" : (Number(v) * 100).toFixed(n) + "%";
      const ok = (b) => b ? '<span class="pill ok">완료</span>' : '<span class="pill bad">실패</span>';

      const colon = data.cohorts?.colon || {};
      const rectal = data.cohorts?.rectal || {};

      byId("meta").textContent = `run_id ${data.run_id} | 생성 ${data.generated_at}`;
      byId("chips").innerHTML = [
        `마스터 cell line ${data.master_table?.rows ?? '-'}`,
        `colon raw ${data.master_table?.cohort_counts?.colon ?? '-'}`,
        `rectal raw ${data.master_table?.cohort_counts?.rectal ?? '-'}`,
        `colon step6 ${colon.step6?.type ?? '-'}`,
        `rectal step6 ${rectal.step6?.type ?? '-'}`
      ].map((x) => `<span class="chip">${esc(x)}</span>`).join("");

      byId("kpis").innerHTML = [
        ["Colon Spearman", fmt(colon.ensemble?.spearman)],
        ["Rectal Spearman", fmt(rectal.ensemble?.spearman)],
        ["Colon P@15", pct(colon.step6?.precision_at_15)],
        ["Rectal P@15", pct(rectal.step6?.precision_at_15)],
        ["Colon 최종 후보 수", colon.step7?.n_output ?? "-"],
        ["Rectal 최종 후보 수", rectal.step7?.n_output ?? "-"],
        ["Colon 승인 수", colon.step7?.approved_count ?? "-"],
        ["Rectal 승인 수", rectal.step7?.approved_count ?? "-"]
      ].map(([k, v]) => `<div class="kpi"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`).join("");

      const extDetail = (typeText) => {
        const t = String(typeText || "").toUpperCase();
        if (t.includes("TCGA-READ")) return "tcga_coadread_data_mrna_seq_v2_rsem.txt + clinical_patient/sample (READ filter)";
        if (t.includes("TCGA-COAD")) return "tcga_coadread_data_mrna_seq_v2_rsem.txt + clinical_patient/sample (COAD filter) + GSE39582_series_matrix.txt.gz";
        if (t.includes("METABRIC")) return "METABRIC expression + clinical tables";
        return "-";
      };

      byId("externalRows").innerHTML = [
        ["COLON", colon.step6?.type, extDetail(colon.step6?.type)],
        ["RECTAL", rectal.step6?.type, extDetail(rectal.step6?.type)]
      ].map(([c, t, d]) => `<tr><td><b>${esc(c)}</b></td><td>${esc(t || '-')}</td><td class="mono">${esc(d)}</td></tr>`).join("");

      const modelCell = (n, skipped, exists) => {
        if (Number(n) > 0) return `<span class="pill ok">${n} 완료</span>`;
        if (skipped === "start_at_post_step4" && exists) return `<span class="pill">재개(기존결과)</span>`;
        if (skipped) return `<span class="pill">skip</span>`;
        return `<span class="pill">-</span>`;
      };

      byId("statusRows").innerHTML = [
        ["colon", colon],
        ["rectal", rectal]
      ].map(([name, c]) => `
        <tr>
          <td><b>${esc(name)}</b></td>
          <td>${modelCell(c.pipeline?.ml_ok_count, c.pipeline?.ml_skipped_reason, c.pipeline?.ml_results_exists)}</td>
          <td>${modelCell(c.pipeline?.dl_ok_count, c.pipeline?.dl_skipped_reason, c.pipeline?.dl_results_exists)}</td>
          <td>${modelCell(c.pipeline?.graph_ok_count, c.pipeline?.graph_skipped_reason, c.pipeline?.graph_results_exists)}</td>
          <td>${ok(Boolean(c.pipeline?.ensemble_ok))}</td>
          <td>${ok(Boolean(c.pipeline?.step6_ok))}</td>
          <td>${ok(Boolean(c.pipeline?.step7_ok))}</td>
        </tr>
      `).join("");

      const top5 = (rows) => {
        const list = Array.isArray(rows) ? rows.slice(0, 5) : [];
        if (!list.length) return `<div class="sub">데이터 없음</div>`;
        return `<table><thead><tr><th>#</th><th>Drug</th><th>Pathway</th><th>Pred IC50</th><th>Score</th><th>분류</th></tr></thead><tbody>${list.map((r) => `<tr><td>${esc(r.final_rank)}</td><td>${esc(r.drug_name)}</td><td>${esc(r.pathway)}</td><td class="mono">${fmt(r.pred_ic50,3)}</td><td class="mono">${fmt(r.combined_score,2)}</td><td>${esc(r.category)}</td></tr>`).join("")}</tbody></table>`;
      };

      const cohortCard = (nameKr, cls, c) => `
        <section class="card">
          <div class="cohortHead ${cls}">${esc(nameKr)} (${esc((c.cohort || '').toUpperCase())})</div>
          <div class="grid2">
            <div>
              <table>
                <tbody>
                  <tr><th>labels rows</th><td class="mono">${esc(c.labels?.rows ?? '-')}</td></tr>
                  <tr><th>unique samples</th><td class="mono">${esc(c.labels?.unique_samples ?? '-')}</td></tr>
                  <tr><th>unique drugs</th><td class="mono">${esc(c.labels?.unique_drugs ?? '-')}</td></tr>
                  <tr><th>feature shape</th><td class="mono">${esc(c.features?.rows ?? '-')} x ${esc(c.features?.cols ?? '-')}</td></tr>
                  <tr><th>step6 type</th><td>${esc(c.step6?.type ?? '-')}</td></tr>
                  <tr><th>step6 P@15</th><td>${pct(c.step6?.precision_at_15)}</td></tr>
                  <tr><th>step7 output</th><td>${esc(c.step7?.n_output ?? '-')}</td></tr>
                </tbody>
              </table>
            </div>
            <div>
              <h3>Top5 최종 후보</h3>
              ${top5(c.step7?.top5)}
            </div>
          </div>
        </section>
      `;

      byId("cohortCards").innerHTML =
        cohortCard("결장", "colon", colon) +
        cohortCard("직장", "rectal", rectal);
    })();
  </script>
</body>
</html>
